<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Search of Sacred Shrines - திருத்தலங்களைத் தேடி</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfaf2;
            --text-color: #2b2b2b;
            --primary-color: #d35400;
            --primary-hover: #e67e22;
            --sidebar-bg: #f3efdf;
            --card-bg: #ffffff;
            --border-color: #e2dac2;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --sidebar-bg: #1e1e1e;
            --card-bg: #1a1a1a;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
        }

        .chapter-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .chapter-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            font-weight: 500;
        }

        .chapter-item:hover, .chapter-item.active {
            background-color: var(--card-bg);
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
        }

        /* Main Workspace Panels */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Navbar Control Panel Matrix */
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background-color: var(--sidebar-bg);
        }

        /* Reading Area Setup */
        #reading-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            line-height: 1.8;
        }

        .story-p {
            margin-bottom: 25px;
            font-size: 1.15rem;
            text-align: justify;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 2rem;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        /* Responsive UI Layouts */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 250px; }
            #reading-area { padding: 20px; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h3 id="app-title-ta">திருத்தலங்களைத் தேடி</h3>
            <h5 id="app-title-en" style="font-weight: 400; opacity: 0.9;">In Search of Sacred Shrines</h5>
        </div>
        <ul class="chapter-list" id="chapters-menu"></ul>
    </nav>

    <main id="main-content">
        <header>
            <button class="btn-secondary" id="toggle-sidebar" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            
            <div class="nav-controls">
                <button id="lang-btn" onclick="toggleLanguage()"><i class="fa-solid fa-language"></i> English</button>
                
                <button class="btn-secondary" onclick="changeFontSize(1)"><i class="fa-solid fa-font"></i>+</button>
                <button class="btn-secondary" onclick="changeFontSize(-1)"><i class="fa-solid fa-font"></i>-</button>
                
                <button class="btn-secondary" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
            </div>
        </header>

        <div id="reading-area">
            <h1 id="chapter-title"></h1>
            <div id="chapter-body"></div>
        </div>
    </main>

    <script>
        // Parallel Bilingual Content Mapping
        const bookData = [
            {
                title: {
                    ta: "நூல் அறிமுகம் & பதிப்புரை",
                    en: "Book Introduction & Preface"
                },
                content: [
                    {
                        ta: "பாருக்குள்ளே நல்ல நாடு நம் பாரத நாடு. உயர் நாடாம் நம் பாரதத் திருநாட்டின் ஆணிவேராக விளங்குவது ஆலயங்களே.",
                        en: "Our land of India is a magnificent nation among the countries of the world. Shrines and temples serve as the fundamental root system of our sacred motherland."
                    },
                    {
                        ta: "நாங்கள் இத்திருத்தலங்களைத் தரிசிக்க மேற்கொண்ட பயணங்களின் தொகுப்பான 'திருத்தலங்களைத் தேடி' எனும் நூலின் இரண்டாம் பகுதி இதுவாகும்.",
                        en: "This is the second volume of 'In Search of Sacred Shrines', a comprehensive collection compiling our personal journeys visiting these dynamic structural temple networks."
                    }
                ]
            },
            {
                title: {
                    ta: "1. முழு முதற் கடவுளாம் விநாயகர்",
                    en: "1. Lord Ganesha - The Supreme Primeval Deity"
                },
                content: [
                    {
                        ta: "'வி' என்றால் மேலான என்றும், வெற்றி என்றும் பொருள் உண்டு. 'நாயகர்' என்றால் தலைவர், விநாயகர் எனில் மேலான தலைவர் என பொருள்.",
                        en: "'Vi' denotes supreme status or victory. 'Nayakar' means leader. Therefore, Vinayaka implies the ultimate supreme leader above all."
                    },
                    {
                        ta: "பிடித்து வைத்தால் பிள்ளையார் என்ற சொலவடை தெரிந்த ஒன்றுதான். கல், மண், மஞ்சள், சாணம், வெல்லம் போன்ற பொருட்களைப் பிடித்து வைத்தால் விநாயகர் அதில் எழுந்தருள்வார்.",
                        en: "The common proverb states that anything shaped by hand can manifest as Ganesha. Be it stone, clay, turmeric, cow dung, or jaggery, Ganesha graciously manifests inside it to bless devotees."
                    }
                ]
            },
            {
                title: {
                    ta: "2. முருகனின் அறுபடை வீடுகள்",
                    en: "2. Lord Murugan and His Six Abodes"
                },
                content: [
                    {
                        ta: "'யாமிருக்க பயமேன்' என்பது முருகப் பெருமானின் அருள் வாக்கு. 'குன்று தோறும் குமரன்' என்ற கூற்றின்படி, குன்றுகளில் முருகன் கோவில் கொண்டுள்ளான்.",
                        en: "'Why fear when I am here' is the divine comforting promise of Lord Murugan. True to the ancient saying, Kumaran resides majestically atop every single sacred hill."
                    },
                    {
                        ta: "முருகப் பெருமானின் அவதார நோக்கம் சூரபத்மனை வதம் செய்து தேவர்களைக் காப்பதாகும். அவனது ஆறு படைவீடுகளும் மனித உடலில் உள்ள ஆதார சக்கரங்களைக் குறிப்பதாகச் சொல்லப்படுகிறது.",
                        en: "The foundational core objective of Lord Murugan's incarnation was to vanquish the demon Surapadman and protect the devas. His six operational military encampments (Arupadaiveedu) represent the six vital energy chakras within the human body."
                    }
                ]
            },
            {
                title: {
                    ta: "3. அகோபிலம் ஓர் உன்னத தரிசனம்",
                    en: "3. Ahobilam - An Sublime Pilgrimage Experience"
                },
                content: [
                    {
                        ta: "அகோபிலத்தில் எழுந்தருளும் நரசிம்மர்களும், நவக்கிரகங்களுடன் தொடர்புடையவையாகும். அவை சத்ரவட நரசிம்மர், யோக நரசிம்மர், ஜ்வாலா நரசிம்மர் என ஒன்பது வடிவங்களாகும்.",
                        en: "The nine distinct variations of Lord Narasimha appearing in Ahobilam are strategically mapped to the nine cosmic bodies of Vedic astrology. They manifest as Chatravata Narasimha, Yoga Narasimha, Jvala Narasimha, among other structural layouts."
                    },
                    {
                        ta: "சாலை என்ற ஒன்றே இல்லாத அடர்ந்த காட்டுப் பாதையில் ஜீப் எங்களைப் புரட்டி எடுக்க, இடுப்பு முறிந்து விடுமோ என்ற அச்சத்துடனே பயணித்து பாவன நரசிம்மரை அடைந்தோம்.",
                        en: "Traveling through dense, trackless jungle pathways where roads did not exist, our mountain jeep threw us around intensely. We journeyed with deep trepidation towards Bhavana Narasimha's platform."
                    }
                ]
            }
        ];

        let currentLanguage = 'ta'; 
        let currentChapter = 0;
        let currentFontSize = 18;

        // Initialize App UI Interface
        function initApp() {
            const menu = document.getElementById('chapters-menu');
            menu.innerHTML = '';
            bookData.forEach((ch, idx) => {
                const li = document.createElement('li');
                li.className = `chapter-item ${idx === currentChapter ? 'active' : ''}`;
                li.id = `ch-${idx}`;
                li.innerText = ch.title[currentLanguage];
                li.onclick = () => loadChapter(idx);
                menu.appendChild(li);
            });
            loadChapter(currentChapter);
        }

        // Render Active Data Viewports
        function loadChapter(index) {
            document.getElementById(`ch-${currentChapter}`).classList.remove('active');
            currentChapter = index;
            document.getElementById(`ch-${currentChapter}`).classList.add('active');

            const chapter = bookData[index];
            document.getElementById('chapter-title').innerText = chapter.title[currentLanguage];
            
            const bodyContainer = document.getElementById('chapter-body');
            bodyContainer.innerHTML = '';
            
            chapter.content.forEach(paragraph => {
                const p = document.createElement('p');
                p.className = 'story-p';
                p.style.fontSize = `${currentFontSize}px`;
                p.innerText = paragraph[currentLanguage];
                bodyContainer.appendChild(p);
            });
        }

        // Toggle Dynamic Language Selector Engine
        function toggleLanguage() {
            currentLanguage = currentLanguage === 'ta' ? 'en' : 'ta';
            document.getElementById('lang-btn').innerHTML = currentLanguage === 'ta' ? '<i class="fa-solid fa-language"></i> English' : '<i class="fa-solid fa-language"></i> தமிழ்';
            initApp();
        }

        // Change Text Accessibility Scales
        function changeFontSize(direction) {
            currentFontSize += direction * 2;
            if(currentFontSize < 14) currentFontSize = 14;
            if(currentFontSize > 32) currentFontSize = 32;
            document.querySelectorAll('.story-p').forEach(p => p.style.fontSize = `${currentFontSize}px`);
        }

        // Toggle Theme Mode Logic Matrix
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.className = 'fa-solid fa-moon';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fa-solid fa-sun';
            }
        }

        // Responsive Hamburger Menu Controller
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.style.display = sidebar.style.display === 'none' ? 'flex' : 'none';
        }

        window.onload = initApp;
    </script>
</body>
</html>
